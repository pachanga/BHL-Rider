pluginGroup = com.bitdotgames.bhl.rider
pluginName = BHL
pluginVersion = 0.7.0

# See https://plugins.jetbrains.com/docs/intellij/build-number-ranges.html
pluginSinceBuild = 243

# IDE to run/build against - Rider.
# Uses the locally installed Rider to avoid downloading the ~1.5GB platform artifact.
# Point this at your Rider installation (the .app bundle on macOS).
platformType = RD
platformVersion = 2025.1.4
platformLocalPath = /Applications/Rider.app

platformPlugins =
platformBundledPlugins =

kotlin.stdlib.default.dependency = false
org.gradle.configuration-cache = true
org.gradle.caching = true
kotlin.code.style = official

# JDK 21 (Homebrew) for the Gradle toolchain
org.gradle.java.installations.paths = /opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home
